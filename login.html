<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin | Rumah Makan Bu Jawa</title>
  <meta name="description" content="Login admin Rumah Makan Bu Jawa untuk mengelola katalog menu, menu harian, dan menu besok.">
  <link href="assets/img/favicon.png" rel="icon">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="login-body">
  <main class="login-page-shell">
    <section class="login-surface" aria-labelledby="login-title">
      <section class="auth-card login-card login-card-premium">
        <div class="login-brand">
          <span class="login-brand-mark" aria-hidden="true">
            <i class="bi bi-shop"></i>
          </span>
          <div class="login-brand-copy">
            <p class="login-brand-name">Rumah Makan Bu Jawa</p>
            <p class="login-brand-subtitle">Dashboard Admin</p>
          </div>
        </div>

        <div class="login-card-head">
          <span class="section-kicker"><i class="bi bi-shield-lock"></i> Akses Aman</span>
          <h1 id="login-title">Login Admin</h1>
          <p>Masuk untuk mengelola katalog, menu harian, dan operasional dashboard.</p>
        </div>

        <form id="login-form" class="auth-form" novalidate>
          <div class="login-field">
            <label for="login-username">Username</label>
            <input id="login-username" type="text" class="form-control" autocomplete="username" placeholder="Masukkan username" required>
          </div>

          <div class="login-field">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" class="form-control" autocomplete="current-password" placeholder="Masukkan password" required>
          </div>

          <p id="login-error" class="login-error" aria-live="polite"></p>

          <button type="submit" class="btn btn-primary-custom login-submit w-100">Masuk ke Dashboard</button>
        </form>

        <div class="login-card-footer">
          <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Kembali ke website publik</a>
        </div>
      </section>
    </section>
  </main>

  <script src="assets/js/admin-core.js"></script>
  <script src="assets/js/admin-auth.js"></script>
  <script src="assets/js/admin-main.js"></script>
</body>
</html>
